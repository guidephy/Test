<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>桃園觀音高中物理科 - 線上題庫</title>
  <style>
    :root{--primary:#1a5276;--accent:#2e86c1;--bg:#f4f6f9;--exp:#1e8449;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:"Microsoft JhengHei",sans-serif;background:var(--bg);color:#2c3e50;}
    .header{background:linear-gradient(135deg,var(--primary),var(--accent));color:white;padding:2rem;text-align:center;}
    .header h1{font-size:1.8rem;}.header p{margin-top:0.5rem;opacity:0.85;}
    .container{max-width:960px;margin:0 auto;padding:2rem 1.5rem;}
    .filter-bar{display:flex;gap:1rem;margin-bottom:2rem;flex-wrap:wrap;align-items:center;}
    .filter-bar select,.filter-bar input{padding:0.5rem 1rem;border:1px solid #ccc;border-radius:6px;font-size:0.95rem;}
    .quiz-grid{display:grid;gap:1.2rem;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));}
    .quiz-card{background:white;border-radius:10px;padding:1.2rem 1.5rem;
      box-shadow:0 2px 8px rgba(0,0,0,0.07);border-left:4px solid var(--accent);
      text-decoration:none;color:inherit;display:block;transition:transform 0.15s;}
    .quiz-card.has-exp{border-left-color:var(--exp);}
    .quiz-card:hover{transform:translateY(-2px);}
    .unit-badge{display:inline-block;background:var(--accent);color:white;
      font-size:0.75rem;padding:0.2rem 0.6rem;border-radius:10px;margin-bottom:0.5rem;}
    .exp-badge{display:inline-block;background:var(--exp);color:white;
      font-size:0.7rem;padding:0.15rem 0.5rem;border-radius:10px;margin-left:0.3rem;}
    .quiz-card h3{font-size:1rem;margin-bottom:0.4rem;}
    .quiz-card .meta{font-size:0.8rem;color:#888;}
    .no-result{text-align:center;color:#aaa;padding:3rem 0;}
  </style>
</head>
<body>
<div class="header">
  <h1>🔬 桃園觀音高中物理科 線上題庫</h1>
  <p>素養導向試題 ／ 含互動實驗 ／ 依單元篩選</p>
</div>
<div class="container">
  <div class="filter-bar">
    <label>篩選單元：</label>
    <select id="unitFilter" onchange="filterQuizzes()"><option value="">全部單元</option></select>
    <select id="expFilter" onchange="filterQuizzes()">
      <option value="">全部題型</option><option value="exp">含互動實驗</option>
    </select>
    <input type="text" id="searchInput" placeholder="搜尋關鍵字..." oninput="filterQuizzes()" style="flex:1;min-width:150px">
    <span id="countDisplay" style="color:#888;font-size:0.9rem"></span>
  </div>
  <div class="quiz-grid" id="quizGrid"></div>
  <div class="no-result" id="noResult" style="display:none">找不到符合的題目</div>
</div>
<script>
<!-- QUIZ_DATA_START -->
const QUIZ_LIST = [
  {
    "unit": "電磁感應",
    "title": "充電不插線！電動車無線充電背後的法拉第感應原理",
    "date": "20260404",
    "url": "quizzes/em_induction/em_induction_20260404.html",
    "has_experiment": true,
    "bloom_levels": [
      "Remember",
      "Understand",
      "Apply",
      "Analyze",
      "Evaluate",
      "Create"
    ],
    "question_count": 10
  },
  {
    "unit": "運動學",
    "title": "AI追蹤科技揭開百米衝刺的物理秘密",
    "date": "20260405",
    "url": "quizzes/kinematics/kinematics_20260405.html",
    "has_experiment": true,
    "bloom_levels": [
      "Remember",
      "Understand",
      "Apply",
      "Analyze",
      "Evaluate",
      "Create"
    ],
    "question_count": 10
  },
  {
    "unit": "直線運動",
    "title": "台灣高鐵的速度密碼——直線運動基本觀念",
    "date": "20260405",
    "url": "quizzes/linear_motion/linear_motion_20260405.html",
    "has_experiment": true,
    "bloom_levels": [
      "Remember",
      "Understand",
      "Apply",
      "Analyze",
      "Evaluate",
      "Create"
    ],
    "question_count": 10
  },
  {
    "unit": "牛頓運動定律",
    "title": "星艦升空背後的三大定律——牛頓運動定律",
    "date": "20260405",
    "url": "quizzes/newton_laws/newton_laws_20260405.html",
    "has_experiment": true,
    "bloom_levels": [
      "Remember",
      "Understand",
      "Apply",
      "Analyze",
      "Evaluate",
      "Create"
    ],
    "question_count": 10
  },
  {
    "unit": "克卜勒行星運動定律",
    "title": "韋伯望遠鏡直接拍到系外行星——克卜勒三大定律",
    "date": "20260405",
    "url": "quizzes/kepler_laws/kepler_laws_20260405.html",
    "has_experiment": true,
    "bloom_levels": [
      "Remember",
      "Understand",
      "Apply",
      "Analyze",
      "Evaluate",
      "Create"
    ],
    "question_count": 10
  }
];
<!-- QUIZ_DATA_END -->
function initFilter(){
  const units=[...new Set(QUIZ_LIST.map(q=>q.unit))].sort();
  const sel=document.getElementById("unitFilter");
  units.forEach(u=>{const o=document.createElement("option");o.value=u;o.textContent=u;sel.appendChild(o);});
}
function filterQuizzes(){
  const unit=document.getElementById("unitFilter").value;
  const expOnly=document.getElementById("expFilter").value==="exp";
  const kw=document.getElementById("searchInput").value.toLowerCase();
  const filtered=QUIZ_LIST.filter(q=>
    (!unit||q.unit===unit)&&(!expOnly||q.has_experiment)&&
    (!kw||q.title.toLowerCase().includes(kw)||q.unit.toLowerCase().includes(kw))
  ).sort((a,b)=>b.date.localeCompare(a.date));
  const grid=document.getElementById("quizGrid"),noResult=document.getElementById("noResult");
  document.getElementById("countDisplay").textContent="共 "+filtered.length+" 份";
  if(!filtered.length){grid.innerHTML="";noResult.style.display="block";return;}
  noResult.style.display="none";
  grid.innerHTML=filtered.map(q=>
    '<a class="quiz-card '+(q.has_experiment?"has-exp":"")+'" href="'+q.url+'" target="_blank">'+
    '<div><span class="unit-badge">'+q.unit+'</span>'+(q.has_experiment?'<span class="exp-badge">🧪 互動實驗</span>':'')+
    '</div><h3>'+q.title+'</h3><div class="meta">'+
    q.date.slice(0,4)+'/'+q.date.slice(4,6)+'/'+q.date.slice(6,8)+' ／ '+q.question_count+' 題</div></a>'
  ).join("");
}
initFilter();filterQuizzes();
</script></body></html>
